<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PetCare – [Seitenname]</title>
  <script>
    const t = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  </script>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
 
<body>
 
  <main class="page">
    <header class="page-header">
      <h1>Kind hinzufügen</h1>
      <p>Füge ein Kind zu deinem Familienprofil hinzu</p>
    </header>
 
    <form id="kidsForm" class="register-child-form">
      <label for="kidsname">Name des Kindes</label>
      <input
        type="text"
        id="kidsname"
        placeholder="z.B. Emma"
        required
      />
 
      <div class="register-child-actions">
        <button type="button" class="btn-secondary" onclick="window.location.href='kids.html'">
          Abbrechen
        </button>
        <button type="submit" class="btn-primary">
          Speichern
        </button>
      </div>
    </form>
  </main>
 
  <footer>
    <nav class="bottom-nav">
      <a href="protected.html" class="nav-item">
        <img src="assets/homeicon_v2.png" alt="Start" />
        <span>Home</span>
      </a>
      <a href="naepfe.html" class="nav-item">
        <img src="assets/dogicon_v2.png" alt="Tiere" />
        <span>Tiere</span>
      </a>
      <a href="kids.html" class="nav-item active">
        <img src="assets/kidsicon_v2.png" alt="Kinder" />
        <span>Kinder</span>
      </a>
      <a href="settings.html" class="nav-item">
        <img src="assets/profileicon_v2.png" alt="Profil" />
        <span>Profil</span>
      </a>
    </nav>
  </footer>
 
   <script src="js/auth.js"></script>
  <script src="js/registerchild.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
