<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PetCare – Home</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <script>
    const t = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  </script>
  
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
 
<body>
 
  <main class="page">
    <div id="familyBanner" style="display:none" class="onboarding-banner">
     Du gehörst noch keiner Familie an. Um die App nutzen zu können, musst du zuerst eine <a href="settings.html">Familie erstellen oder einer beitreten →</a>
    </div>

    <header class="page-header">
      <h1>Herzlich Willkommen Familie <span id="familienname"></span>!</h1>
      <p id="currentDate"></p>
    </header>
 
    <section class="dashboard-section">
      <h2 class="section-title">Heutige Aufgaben</h2>
      <div id="tasksContainer" class="dashboard-cards"></div>
    </section>
 
    <section class="dashboard-section">
      <h2 class="section-title">Meine Haustiere</h2>
      <div id="petsContainer" class="dashboard-cards"></div>
      <button class="btn-dashboard" onclick="window.location.href='registeranimal.html'">+ Tier hinzufügen</button>
    </section>
 
    <section class="dashboard-section">
      <h2 class="section-title">Meine Kinder</h2>
      <div id="kidsWidgetContainer" class="dashboard-cards"></div>
      <button class="btn-dashboard" onclick="window.location.href='registerchild.html'">+ Kind hinzufügen</button>
    </section>
  </main>
 
  <footer>
    <nav class="bottom-nav">
      <a href="protected.html" class="nav-item active"><img src="assets/homeicon_v2.png" alt="Start" /><span>Home</span></a>
      <a href="naepfe.html" class="nav-item"><img src="assets/dogicon_v2.png" alt="Tiere" /><span>Tiere</span></a>
      <a href="kids.html" class="nav-item"><img src="assets/kidsicon_v2.png" alt="Kinder" /><span>Kinder</span></a>
      <a href="settings.html" class="nav-item"><img src="assets/profileicon_v2.png" alt="Profil" /><span>Profil</span></a>
    </nav>
  </footer>
 
  <script src="js/auth.js"></script>
  <script src="js/protected.js"></script>
  <script src="js/protectedDOM.js"></script>
</body>
</html>
