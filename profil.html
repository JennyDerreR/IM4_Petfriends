<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PetCare – Profil</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <script>
    const t = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  </script>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>

  <main class="page">
    <header class="page-header">
      <button class="btn-back" onclick="window.location.href='settings.html'">← Zurück</button>
      <h1>Profil bearbeiten</h1>
      <p>Passe deine Kontodaten an</p>
    </header>

    <form id="profilForm" class="register-child-form">

      <label for="lastname">Nachname</label>
      <input type="text" id="lastname" placeholder="z.B. Müller" />

      <label for="email">Email</label>
      <input type="email" id="email" readonly placeholder="deine@email.ch" />

      <div class="register-child-actions">
        <button type="submit" class="btn-primary">
          Speichern
        </button>
      </div>

    </form>

    <div style="height: 16px;"></div>

    <button type="button" class="btn-logout" id="passwortAendern">
      Passwort ändern
    </button>

  </main>

  <footer>
    <nav class="bottom-nav">
      <a href="protected.html" class="nav-item">
        <img src="assets/homeicon_v2.png" alt="Start" />
        <span>Home</span>
      </a>
      <a href="naepfe.html" class="nav-item">
        <img src="assets/dogicon_v2.png" alt="Tiere" />
        <span>Tiere</span>
      </a>
      <a href="kids.html" class="nav-item">
        <img src="assets/kidsicon_v2.png" alt="Kinder" />
        <span>Kinder</span>
      </a>
      <a href="settings.html" class="nav-item active">
        <img src="assets/profileicon_v2.png" alt="Profil" />
        <span>Profil</span>
      </a>
    </nav>
  </footer>

  
  <script src="js/auth.js"></script>
  <script src="js/profil.js"></script>
  <script src="js/nav.js"></script>

</body>
</html>
