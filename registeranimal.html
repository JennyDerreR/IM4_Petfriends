<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" user-scalable="no">
    <title>PetCare</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>


<form id="animalForm">

  <label for="animal_name">Name des Tieres</label>
  <input type="text" id="animal_name" required>

  <label for="type">Welche Tierart?</label>
  <input type="text" id="type" required>

  <label for="snr">Napfnummer</label>
  <input type="text" id="snr" required>

  <label for="neededgramms">Wie viel Futter braucht das Tier?</label>
  <input type="number" id="neededgramms" required>

  <label for="child_id">Verantwortliches Kind</label>
  <select id="child_id" required>
    <option value="">Bitte Kind auswählen</option>
  </select>


  <div class="button-container">
    <button type="button" onclick="window.location.href='protected.html'">
      Abbrechen
    </button>

    <button type="submit">
      Speichern
    </button>
  </div>

</form>

<script src="js/registeranimal.js"></script>
