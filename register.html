<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" user-scalable="no">
    <title>PetCare</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>

  <body>

    <div class="HeroSectionRegister">
      <img src="assets/PetCareLogo.png" alt="Logo" class="petcareLogo" />
       <h1>Registrierung</h1>
       <p>Erstellen Sie Ihr PetCare Konto!</p>
    </div>

    <form id="registerForm">
      <div>
        <label>Nachname</label>
        <input type="text" id="lastname" required />
      </div>

      <div>
        <label>Vorname</label>
        <input type="text" id="firstname" required />
      </div>

      <div>
        <label>Email</label>
        <input type="email" id="email" required />
      </div>

      <div>
        <label>Passwort</label>
        <input type="password" id="password" required />
      </div>

      <button type="submit">Konto erstellen</button>

    </form>

    <p>Sie haben bereits ein Konto? <a href="login.html">Jetzt anmelden</a>.</p>

    
    <div class="IconSection">
     
      <img src="assets/dogicon_v2.png" alt="animalIcons" class="animalIcons" />
      <img src="assets/caticon_v2.png" alt="animalIcons" class="animalIcons" />
      <img src="assets/bunnyicon_v2.png" alt="animalIcons" class="animalIcons" />
      <img src="assets/gunneapig_v2.png" alt="animalIcons" class="animalIcons" />
      <img src="assets/birdicon_v2.png" alt="animalIcons" class="animalIcons" />

    </div>

    <script src="js/register.js"></script>
  </body>
</html>
